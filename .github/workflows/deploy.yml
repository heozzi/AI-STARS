name: Aiservice Upload ECR

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '수동 배포'
        required: true
        default: 'version'
        type: choice
        options:
          - all
          - latest

jobs:
  upload-image:
    runs-on: ubuntu-latest
    env :
      IMAGE_TAG: ${{ github.run_number }}
    steps:
      - name: Set IMAGE_TAG based on input
        id: tag
        run: |
          if [ "${{ github.event.inputs.environment }}" = "all" ]; then
            echo "IMAGE_TAG=1.0.${{ github.run_number }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Create .env from secret
        run: echo "./AiService/${{ secrets.ENV }}" > .env

      - name: push the image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: aiservice
          
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./AiService/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Set up kubeconfig
        run: aws eks update-kubeconfig --region ap-northeast-2 --name one-cluster

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: aiservice
        run: |
          kubectl set image deployment/aiservice aiservice=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          kubectl rollout status deployment/aiservice